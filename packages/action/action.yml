name: ProdVerdict
description: >
  Deterministic production contract checks for AI-assisted SaaS. Verifies Stripe
  subscription state matches app access controls (access contract) and environment
  variables are correctly declared (config contract). Posts findings as PR comments.
author: prodv-dev
branding:
  icon: shield
  color: green

inputs:
  config:
    description: Path to prodverdict.yml relative to the repository root
    required: false
    default: ./prodverdict.yml
  contract:
    description: Contract to run — "access" (Stripe vs DB) or "config" (env vars)
    required: false
    default: access
  strict:
    description: Fail the check when only medium/low severity findings exist (warn verdict)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install and build ProdVerdict
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      run: npm ci && npm run build

    - name: Run contract check
      shell: bash
      working-directory: ${{ github.workspace }}
      run: node "${{ github.action_path }}/dist/index.js"
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CONTRACT: ${{ inputs.contract }}
        INPUT_STRICT: ${{ inputs.strict }}
        STRIPE_SECRET_KEY: ${{ env.STRIPE_SECRET_KEY }}
        DATABASE_URL: ${{ env.DATABASE_URL }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
