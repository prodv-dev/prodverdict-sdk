name: ProdVerdict
description: Deterministic Stripe vs database access checks for AI-assisted SaaS. Catch revenue leaks in CI.
author: prodv-dev
branding:
  icon: shield
  color: green

inputs:
  config:
    description: Path to prodverdict.yml relative to the repository root
    required: false
    default: ./prodverdict.yml
  contract:
    description: Contract to run — access, config, or migration
    required: false
    default: access
  strict:
    description: Fail the check when only medium/low severity findings exist (warn verdict)
    required: false
    default: 'false'
  slack_webhook_url:
    description: Optional Slack incoming webhook URL — notifies on fail/warn (or set SLACK_WEBHOOK_URL env)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install and build ProdVerdict
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      run: npm ci && npm run build

    - name: Run contract check
      shell: bash
      working-directory: ${{ github.workspace }}
      run: node "${{ github.action_path }}/dist/index.js"
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CONTRACT: ${{ inputs.contract }}
        INPUT_STRICT: ${{ inputs.strict }}
        INPUT_SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        STRIPE_SECRET_KEY: ${{ env.STRIPE_SECRET_KEY }}
        PADDLE_API_KEY: ${{ env.PADDLE_API_KEY }}
        PADDLE_ENVIRONMENT: ${{ env.PADDLE_ENVIRONMENT }}
        DATABASE_URL: ${{ env.DATABASE_URL }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
