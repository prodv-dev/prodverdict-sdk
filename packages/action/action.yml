name: ProdVerdict Access Check
description: >
  Verify Stripe subscription state matches app access controls. Fails the
  check on high-severity mismatches and posts a findings comment on pull requests.
author: ProdVerdict

inputs:
  config:
    description: Path to prodverdict.yml relative to the repository root
    required: false
    default: ./prodverdict.yml
  contract:
    description: Contract to run (currently only "access" is supported)
    required: false
    default: access
  strict:
    description: Fail the check when only medium/low severity findings exist (warn verdict)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install and build ProdVerdict
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      run: npm ci && npm run build

    - name: Run access contract check
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      run: node packages/action/dist/index.js
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CONTRACT: ${{ inputs.contract }}
        INPUT_STRICT: ${{ inputs.strict }}
        STRIPE_SECRET_KEY: ${{ env.STRIPE_SECRET_KEY }}
        DATABASE_URL: ${{ env.DATABASE_URL }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
