# Run config, migration, boundary, and webhook contracts on pull requests.
# These are PR-gate lint checks — they catch issues in the diff before merge.
#
# NOTE: Access is NOT a PR gate. Access compares live Stripe vs live DB state,
# which only makes sense on a schedule. Use prodverdict-scheduled-access.yml
# for the Access contract.
#
# Copy to .github/workflows/prodverdict-pr.yml in your app repo.
name: ProdVerdict PR checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  pr-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prodv-dev/prodverdict-action@v0.13.0
        with:
          config: ./prodverdict.yml
          contract: all
          strict: false
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODVERDICT_API_URL: https://prodverdict.com
          PRODVERDICT_API_KEY: ${{ secrets.PRODVERDICT_API_KEY }}
          PRODVERDICT_PROJECT_ID: ${{ secrets.PRODVERDICT_PROJECT_ID }}
