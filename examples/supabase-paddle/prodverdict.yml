version: 1
contracts:
  - type: access
    source_of_truth: paddle
    database:
      url_env: DATABASE_URL
      users_table: profiles
      columns:
        id: id
        stripe_customer_id: paddle_customer_id
        has_paid_access: has_paid_access
        plan: plan
    paddle:
      api_key_env: PADDLE_API_KEY
    plans:
      pri_01SupStarter: starter
      pri_01SupPro: pro
    severity: high
    fix: >
      In your Paddle webhook handler (or Supabase Edge Function), update
      public.profiles: set has_paid_access=true and sync plan from the
      subscription. On subscription.canceled, revoke access.
