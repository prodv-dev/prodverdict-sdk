version: 1
contracts:
  - type: access
    source_of_truth: stripe
    database:
      url_env: DATABASE_URL
      users_table: profiles
      columns:
        id: id
        stripe_customer_id: stripe_customer_id
        has_paid_access: has_paid_access
        plan: plan
    stripe:
      secret_env: STRIPE_SECRET_KEY
    plans:
      price_1SupStarter: starter
      price_1SupPro: pro
    severity: high
    fix: >
      In your Stripe webhook handler (Edge Function or API route),
      update public.profiles: set has_paid_access=true and sync plan from
      the subscription price. On customer.subscription.deleted, set
      has_paid_access=false.
